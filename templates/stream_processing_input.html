{% block map %}

<h3 style="text-align:center;">Electoral Roll Stream Processing</h3>
<h4 style="text-align:center;">Upload files for a single election and process</h4>

<!-- Election selection -->
<div style="margin-bottom: 10px; padding: 10px; background: #f0f0f0; border-radius: 4px;">
  <strong>Active Election:</strong> <span id="active-election-display">Loading...</span>
</div>

<!-- File table -->
<div style="overflow-x:auto; border:1px solid #ccc; padding:5px; margin-bottom:20px;">
  <table id="file-table" border="1" style="border-collapse: collapse; width:100%;">
    <thead>
      <tr>
        <th>Order</th>
        <th>Filename</th>
        <th>File Type</th>
        <th>Purpose</th>
        <th>Fix Level</th>
        <th>Upload</th>
        <th>Remove</th>
      </tr>
    </thead>
    <tbody id="file-table-body">
      <!-- Populated dynamically -->
    </tbody>
  </table>
</div>

<div style="margin-bottom: 10px;">
  <button id="add-file-btn">Add File</button>
  <button id="save-stream-btn">Save Changes</button> <!-- Add this -->
</div>

<!-- Process & Progress -->
<div>
  <button id="process-election-btn">Process Election</button>
</div>

<div id="progress-container" style="margin-top:20px; display:none; width:400px;">

  <div style="margin-bottom:6px;">
    <strong id="stage-name">Preparing...</strong>
  </div>

  <!-- Overall Progress -->
  <progress id="progress-bar" value="0" max="100" style="width:100%;"></progress>
  <div style="text-align:right;">
    <span id="progress-text">0%</span>
  </div>

  <!-- Stage Progress -->
  <div style="margin-top:8px;">
    <small>Stage Progress</small>
    <progress id="stage-bar" value="0" max="100" style="width:100%; height:8px;"></progress>
  </div>

</div>

<!-- Stream RAG Status Table -->
<h3 style="text-align:center;">Stream Processing Status</h3>
<div style="overflow-x:auto; border:1px solid #ccc; padding:5px;">
  <table id="stream-table" border="1" style="border-collapse: collapse; width:100%;">
    <thead>
      <tr>
        <th>Stream</th>
        <th>Alive</th>
        <th>Loaded</th>
        <th>Elect</th>
        <th>RAG</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="stream-table-body">
      <!-- Dynamic content will be inserted here -->
    </tbody>
  </table>
</div>

{% endblock %}

<script>



  function updateStreamStatus() {
      fetch('/get_streamrag')  // Adjust the endpoint if needed
          .then(response => response.json())
          .then(data => {
              const tableBody = document.querySelector('#stream-table-body');  // Get table body for insertion
              tableBody.innerHTML = '';  // Clear the existing table rows

              // Loop through the stream data and create table rows dynamically
              for (const [key, value] of Object.entries(data)) {
                  const row = document.createElement('tr');  // Create a new row

                  // Set row color based on the RAG status
                  row.style.backgroundColor = value['RAG'];

                  // Add table cells to the row
                  row.innerHTML = `
                      <td>${key}</td>
                      <td>${value['Alive']}</td>
                      <td>${value['Files']}</td>
                      <td>${value['Elect']}</td>
                      <td>${value['RAG']}</td>
                      <td>
                          <button class="deactivate-btn" data-stream-key="${key}">Deactivate</button>
                      </td>
                  `;

                  tableBody.appendChild(row);  // Append row to the table body
              }
          })
          .catch(error => console.error('Error fetching stream data:', error));
  }


    function deactivateElection(streamKey) {
      fetch(`/deactivate_election/${streamKey}`, {
          method: 'POST',
      })
      .then(response => response.json())
      .then(data => {
          if (data.success) {
              alert(`Election ${streamKey} deactivated successfully.`);

              // Optionally remove the row from the table
              const rowToRemove = document.querySelector(`[data-stream-key="${streamKey}"]`);
              if (rowToRemove) {
                  rowToRemove.remove();  // Remove the row from the table
              }

              // Refresh the stream status table
              updateStreamStatus();  // This will fetch the new data and update the table
          } else {
              alert(`Failed to deactivate election ${streamKey}.`);
          }
      })
      .catch(error => {
          console.error('Error deactivating election:', error);
          alert('Error deactivating election.');
      });
  }

  document.addEventListener("DOMContentLoaded", () => {

    let selectedElection = "";

    function syncWithParentTab() {
        // 1. Find the active tab in the parent document
        const activeTab = window.parent.document.querySelector('#election-tabs .election-tab.active');

        if (activeTab) {
            selectedElection = activeTab.getAttribute('data-election');

            // Update local UI display
            const display = document.getElementById('active-election-display');
            if (display) display.textContent = selectedElection;

            console.log("Child synced to Active Parent Tab:", selectedElection);

            // 2. Load the data for this election
            loadElectionData(selectedElection);
        } else {
            console.warn("No active election tab found in parent.");
        }
    }

    // New version of your load logic
    async function loadElectionData(ename) {
        try {
            // 1. Fetch the stream/file data from the server
            const data = await fetch(`/get_stream_processing/${ename}`).then(r => r.json());
            stream_processing = data;

            // 2. REACH INTO THE PARENT (Dash0) for constants/options
            // Check what Dash0 calls these variables (e.g., parent_constants, election_options)
            const pConstants = window.parent.CONSTANTS || window.parent.constants;
            const pOptions = window.parent.OPTIONS || window.parent.options;

            // 3. Call the UI update function safely
            if (typeof updateConstantsUI === "function") {
                if (pConstants && pOptions) {
                    updateConstantsUI(pConstants, pOptions);
                } else {
                    console.warn("Could not find constants/options in parent Dash0.");
                }
            }

            // 4. Render the tables
            renderFileTable();
            updateStreamStatus();

        } catch(err) {
            console.error("Failed to load data for " + ename, err);
        }
    }

    // Initial sync
    syncWithParentTab();


  // ------------------------
  // DOM helpers
  // ------------------------
  const qs = (sel, ctx=document) => ctx.querySelector(sel);
  const qsa = (sel, ctx=document) => [...ctx.querySelectorAll(sel)];

  // ------------------------
  // Single source of truth
  // ------------------------
  let stream_processing = { files: [], last_run: null, status: "idle" };

  // ------------------------
  // Render the file table
  // ------------------------
  function renderFileTable() {
    const tbody = qs('#file-table-body');
    tbody.innerHTML = '';

    stream_processing.files.forEach((file, idx) => {
      const tr = document.createElement('tr');
      tr.dataset.index = idx;
      tr.innerHTML = `
        <td><input type="number" class="order" value="${file.order}" style="width:50px;"></td>
        <td>
          <input type="text" class="filename" value="${file.file_path?.split('/').pop() || ''}" readonly style="width:150px;">
          <input type="file" class="file-picker" style="display:none;">
        </td>
        <td>
          <select class="type">
            <option value="csv" ${file.type==='csv'?'selected':''}>csv</option>
            <option value="xlsx" ${file.type==='xlsx'?'selected':''}>xlsx</option>
            <option value="json" ${file.type==='json'?'selected':''}>json</option>
          </select>
        </td>
        <td>
          <select class="purpose">
            <option value="main" ${file.purpose==='main'?'selected':''}>main</option>
            <option value="delta" ${file.purpose==='delta'?'selected':''}>delta</option>
            <option value="avi" ${file.purpose==='avi'?'selected':''}>avi</option>
            <option value="mark" ${file.purpose==='mark'?'selected':''}>mark</option>
            <option value="resource" ${file.purpose==='resource'?'selected':''}>resource</option>
          </select>
        </td>
        <td><input type="number" class="fixlevel" value="${file.fixlevel || 0}" style="width:50px;"></td>
        <td><button class="upload-btn">📂</button></td>
        <td><button class="remove-btn">❌</button></td>
      `;
      tbody.appendChild(tr);

      // File upload
      const filePicker = tr.querySelector('.file-picker');
      tr.querySelector('.upload-btn').addEventListener('click', () => filePicker.click());
      filePicker.addEventListener('change', async (e) => {
        const f = e.target.files[0];
        if (!f) return;
        try {
          const formData = new FormData();
          formData.append('file', f);
          formData.append('election', selectedElection);
          formData.append('index', idx);

          const result = await fetch('/upload_file', {method:'POST', body:formData}).then(r=>r.json());
          if (result.error) throw new Error(result.error);

          tr.querySelector('.filename').value = f.name;
          stream_processing.files[idx].file_path = result.path;
        } catch(err) {
          alert("Upload failed: " + err.message);
        }
      });

      // Remove file
      tr.querySelector('.remove-btn').addEventListener('click', () => {
        stream_processing.files.splice(idx, 1);
        renderFileTable();
      });
    });
  }

  // ------------------------
  // Add a new file row
  // ------------------------
  const addBtn = qs('#add-file-btn');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      stream_processing.files.push({
        order: stream_processing.files.length + 1,
        file_path: "",
        type: "csv",
        purpose: "main",
        fixlevel: 0
      });
      renderFileTable();
    });
  }

  // ---------------------------------
// Global listener for Deactivate buttons
// ---------------------------------
document.addEventListener('click', function (e) {
  if (e.target.classList.contains('deactivate-btn')) {
    const streamKey = e.target.dataset.streamKey;
    deactivateElection(streamKey);
  }
});


  // ------------------------
  // Save stream_processing
  // ------------------------
  const saveBtn = qs('#save-stream-btn');
  if (saveBtn) {
    saveBtn.addEventListener('click', async () => {
      // Update from table first
      const tbody = qs('#file-table-body');
      stream_processing.files = qsa('tr', tbody).map(tr => ({
        order: Number(tr.querySelector('.order').value),
        file_path: tr.querySelector('.filename').value,
        type: tr.querySelector('.type').value,
        purpose: tr.querySelector('.purpose').value,
        fixlevel: Number(tr.querySelector('.fixlevel').value)
      }));

      try {
        const res = await fetch(`/save_stream_processing/${selectedElection}`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(stream_processing)
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        alert("Changes saved successfully!");
      } catch(err) {
        alert("Save failed: " + err.message);
      }
    });
  }


    // ------------------------
  // Process Election button
  // ------------------------
  const processBtn = qs('#process-election-btn');
  if (processBtn) {
    processBtn.addEventListener('click', async () => {
      if (!selectedElection || !stream_processing.files.length) {
        alert("Select an election and add files first.");
        return;
      }

      // Show progress UI
      qs('#progress-container').style.display = "block";
      qs('#progress-bar').value = 0;
      qs('#progress-text').innerText = "0%";

      // Prepare payload
      const filesWithPaths = stream_processing.files.filter(f => f.file_path);
      if (!filesWithPaths.length) {
        alert("You must upload at least one file before processing.");
        return;
      }

      const payload = {
        ename: selectedElection,
        files: filesWithPaths.map(f => ({
          stored_path: f.file_path,
          order: f.order,
          type: f.type,
          purpose: f.purpose,
          fixlevel: f.fixlevel
        }))
      };

      function updateRagUI(ragData) {
      if (!ragData || typeof ragData !== "object") {
          console.error("Invalid RAG data");
          return;
      }

      // Get the table body where we'll insert rows
      const tableBody = document.querySelector('#stream-table-body');
      if (!tableBody) {
          console.error("Table body #stream-table-body not found in DOM");
          return;
      }

      // Clear existing table rows
      tableBody.innerHTML = '';

      // Loop through each stream entry
      for (const [streamName, streamInfo] of Object.entries(ragData)) {
          const row = document.createElement('tr');

          // Determine row color based on RAG status
          const rag = (streamInfo.RAG || "").toLowerCase();
          switch (rag) {
              case 'red':
                  row.style.backgroundColor = '#ff4d4d';
                  break;
              case 'amber':
                  row.style.backgroundColor = '#ffcc00';
                  break;
              case 'green':
                  row.style.backgroundColor = '#4caf50';
                  break;
              default:
                  row.style.backgroundColor = '#f0f0f0';
          }

          // Fill the row with table cells
          row.innerHTML = `
              <td>${streamName}</td>
              <td>${streamInfo.Alive ?? ''}</td>
              <td>${streamInfo.Files ?? ''}</td>
              <td>${streamInfo.Elect ?? ''}</td>
              <td>${streamInfo.RAG ?? ''}</td>
              <td>
                  <button class="deactivate-btn" data-stream-key="${streamName}">Deactivate</button>
              </td>
          `;

          tableBody.appendChild(row);
      }

      // Optionally, attach event listeners for the deactivate buttons
      tableBody.querySelectorAll('.deactivate-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
              const key = e.target.dataset.streamKey;
              console.log(`Deactivate clicked for ${key}`);
              // Add your deactivation logic here
          });
      });
  }

      // Function to poll progress
      async function pollProgress() {
      try {
        const data = await fetch('/progress').then(r => r.json());

        const overallPercent = data.percent || 0;
        const stagePercent = data.stage_progress || 0;
        const stageName = data.current_stage || data.status || "";
        const message = data.message || "";

        // Show container if hidden
        qs('#progress-container').style.display = "block";

        // ---------------------------
        // Overall progress bar
        qs('#progress-bar').value = overallPercent;
        qs('#progress-text').innerText = `${overallPercent}% — ${stageName} — ${message}`;

        // ---------------------------
        // Stage progress bar (if exists)
        const stageBar = qs('#stage-bar');
        if (stageBar) {
          stageBar.value = stagePercent;
        }

        // ---------------------------
        // Continue polling if running
        if (data.status !== "complete" && data.status !== "error") {
          setTimeout(pollProgress, 500);
        } else if (data.status === "complete") {
          qs('#progress-text').innerText = "✅ Complete";
          if (stageBar) stageBar.value = 100;
          qs('#progress-bar').value = 100;

          // ---------------------------
          // Fetch the updated RAG stream after completion
          try {
            const ragRes = await fetch('/get_streamrag');
            const ragData = await ragRes.json();
            updateRagUI(ragData);  // <-- your function to update the RAG UI
          } catch (err) {
            console.error("Failed to fetch RAG data:", err);
          }

        } else if (data.status === "error") {
          qs('#progress-text').innerText = "❌ Error — " + message;
        }

      } catch (err) {
        console.error("Error polling progress:", err);
        // Retry on failure
        setTimeout(pollProgress, 1000);
      }
    }



      // Start normalization
      try {
        const res = await fetch('/normalise', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || `HTTP ${res.status}`);
        }

        // Only start polling after successful POST
        pollProgress();

      } catch(err) {
        alert("Processing failed: " + err.message);
        qs('#progress-container').style.display = "none";
      }
    });
  }




});

</script>
